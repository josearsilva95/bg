backend:
  name: git-gateway
  branch: main

# Rebranding leve do painel (recursos oficiais do Decap CMS)
logo_url: "/admin/logo.svg"
site_url: "/"
display_url: "/"

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "pt"

collections:
  - name: "loja"
    label: "Loja"
    files:
      - name: "site"
        label: "Vitrine e WhatsApp"
        file: "data/site.json"
        fields:
          - label: "Link do WhatsApp"
            name: "whatsapp"
            widget: "string"
            hint: "Formato: https://wa.me/55DDDNUMERO (só números depois de wa.me/)"
          - label: "Produtos"
            name: "produtos"
            widget: "list"
            summary: "{{nome}} — {{preco}}"
            fields:
              - label: "Fotos"
                name: "imagens"
                widget: "list"
                required: false
                hint: "A primeira foto é a capa do card. Adicione quantas quiser — no site elas abrem em galeria ao clicar."
                field: { label: "Foto", name: "src", widget: "image" }
              - label: "Nome"
                name: "nome"
                widget: "string"
              - label: "Categoria"
                name: "categoria"
                widget: "select"
                # Lista fixa — se precisar adicionar uma categoria nova,
                # atualize também o array CATEGORIAS em index.html.
                options: ["Bolsa", "Pulseira", "Brinco", "Cinto", "Lenço", "Relógio"]
              - label: "Preço"
                name: "preco"
                widget: "string"
                hint: "Ex: R$ 189"
              - label: "Descrição"
                name: "desc"
                widget: "text"
